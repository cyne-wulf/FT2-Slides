<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Make Your Own Financial Agent - Module 2</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="viewport-shell">
      <main id="deck" class="deck" aria-live="polite"></main>
    </div>

    <nav class="control-hud" aria-label="Slide controls">
      <button class="icon-button" type="button" data-prev aria-label="Previous slide">
        <span aria-hidden="true">&lt;</span>
      </button>
      <button class="progress-track" type="button" data-progress aria-label="Jump through slides">
        <span class="progress-fill"></span>
      </button>
      <output class="slide-count" aria-label="Current slide">01 / 59</output>
      <button class="icon-button primary" type="button" data-next aria-label="Next slide">
        <span aria-hidden="true">&gt;</span>
      </button>
    </nav>

    <script src="./deck.js"></script>
  </body>
</html>
